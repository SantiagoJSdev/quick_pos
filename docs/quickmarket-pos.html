<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quick Market POS – Facturación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ===================== DESIGN TOKENS ===================== */
:root {
  --font-body: 'Inter', 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --text-xs:   clamp(0.75rem,  0.7rem + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem + 1.25vw, 2rem);

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;

  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-full: 9999px;

  --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
}

[data-theme="dark"] {
  --color-bg:             #111210;
  --color-surface:        #191918;
  --color-surface-2:      #1e1e1c;
  --color-surface-3:      #252523;
  --color-surface-4:      #2c2c2a;
  --color-divider:        #2f2f2d;
  --color-border:         #383836;

  --color-text:           #e8e7e4;
  --color-text-muted:     #888784;
  --color-text-faint:     #555452;
  --color-text-inverse:   #111210;

  /* Brand: Naranja Quick Market */
  --color-primary:        #f07d2a;
  --color-primary-hover:  #e86b14;
  --color-primary-active: #d45a00;
  --color-primary-dim:    rgba(240, 125, 42, 0.15);
  --color-primary-hl:     rgba(240, 125, 42, 0.08);

  --color-success:        #5aab3e;
  --color-success-dim:    rgba(90, 171, 62, 0.15);
  --color-error:          #e05252;
  --color-error-dim:      rgba(224, 82, 82, 0.15);
  --color-gold:           #e8c34a;
  --color-gold-dim:       rgba(232, 195, 74, 0.12);

  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 14px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 36px rgba(0,0,0,0.5);
}

/* ===================== BASE ===================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input { font: inherit; color: inherit; background: none; border: none; outline: none; }
img { display: block; max-width: 100%; }
.sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

/* ===================== LAYOUT SHELL ===================== */
/* Simulated phone frame */
.phone-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: var(--space-8) var(--space-4);
  background: #0a0a09;
}

.phone-frame {
  width: 390px;
  height: 844px;
  background: var(--color-bg);
  border-radius: 44px;
  border: 2px solid #2a2a28;
  box-shadow: 0 0 0 6px #161614, var(--shadow-lg);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Notch */
.phone-notch {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.notch-cutout {
  width: 120px;
  height: 30px;
  background: #0d0d0c;
  border-radius: 0 0 18px 18px;
  border: 2px solid #222220;
  border-top: none;
}

/* ===================== TOP BAR ===================== */
.top-bar {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-4) var(--space-3);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}

.top-bar-logo {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.logo-mark {
  width: 28px;
  height: 28px;
  background: var(--color-primary);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 16px; height: 16px; fill: white; }
.logo-text {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text);
  letter-spacing: -0.01em;
}
.logo-text span { color: var(--color-primary); }

.top-bar-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.rate-badge {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-gold-dim);
  border: 1px solid rgba(232,195,74,0.2);
  border-radius: var(--radius-full);
  padding: 2px var(--space-2);
}
.rate-dot { width: 5px; height: 5px; background: var(--color-gold); border-radius: 50%; }
.rate-text {
  font-size: 10px;
  font-weight: 600;
  color: var(--color-gold);
  font-family: var(--font-mono);
}
.rate-label {
  font-size: 9px;
  color: var(--color-text-muted);
  margin-top: 1px;
}

/* ===================== SEARCH BAR ===================== */
.search-section {
  padding: var(--space-3) var(--space-4);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
}

.search-row {
  display: flex;
  gap: var(--space-2);
  align-items: center;
}

.search-input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-2) var(--space-3);
  transition: border-color var(--transition);
}
.search-input-wrap:focus-within {
  border-color: var(--color-primary);
  background: var(--color-surface-4);
}
.search-icon { color: var(--color-text-muted); flex-shrink: 0; }
.search-input {
  flex: 1;
  font-size: var(--text-sm);
  color: var(--color-text);
  background: transparent;
}
.search-input::placeholder { color: var(--color-text-faint); }
.search-clear {
  color: var(--color-text-muted);
  cursor: pointer;
  display: none;
  padding: 2px;
  border-radius: var(--radius-sm);
  transition: color var(--transition);
}
.search-clear:hover { color: var(--color-text); }

.scan-btn {
  width: 42px;
  height: 42px;
  background: var(--color-primary-dim);
  border: 1px solid rgba(240,125,42,0.25);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-primary);
  transition: background var(--transition), transform var(--transition);
  flex-shrink: 0;
}
.scan-btn:hover, .scan-btn:active { background: rgba(240,125,42,0.25); transform: scale(0.96); }
.scan-btn svg { width: 20px; height: 20px; }

/* Search results dropdown */
.search-results {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-top: var(--space-1);
  overflow: hidden;
  box-shadow: var(--shadow-md);
  z-index: 20;
  display: none;
}
.search-results.visible { display: block; }
.result-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  cursor: pointer;
  transition: background var(--transition);
}
.result-item:last-child { border-bottom: none; }
.result-item:hover, .result-item:active { background: var(--color-surface-3); }
.result-emoji {
  width: 36px; height: 36px;
  background: var(--color-surface-4);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-meta {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: 1px;
}
.result-price {
  text-align: right;
  flex-shrink: 0;
}
.result-price-usd {
  font-size: var(--text-sm);
  font-weight: 600;
  font-family: var(--font-mono);
  color: var(--color-text);
}
.result-price-ves {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  font-family: var(--font-mono);
}

/* ===================== CART LIST ===================== */
.cart-section {
  flex: 1;
  overflow-y: auto;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}

.cart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-3) var(--space-4) var(--space-2);
  position: sticky;
  top: 0;
  background: var(--color-bg);
  z-index: 5;
  border-bottom: 1px solid var(--color-divider);
}
.cart-title {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--color-text-muted);
}
.cart-count {
  background: var(--color-primary);
  color: white;
  font-size: 10px;
  font-weight: 700;
  border-radius: var(--radius-full);
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}

.cart-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-10) var(--space-8);
  gap: var(--space-3);
  color: var(--color-text-faint);
}
.cart-empty svg { width: 48px; height: 48px; opacity: 0.4; }
.cart-empty-title {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text-muted);
}
.cart-empty-sub {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  text-align: center;
  max-width: 24ch;
}

/* Cart item */
.cart-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  animation: slideIn 0.2s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.item-emoji {
  width: 40px; height: 40px;
  background: var(--color-surface-3);
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.item-info { flex: 1; min-width: 0; }
.item-name {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-prices {
  display: flex;
  gap: var(--space-2);
  align-items: center;
  margin-top: 2px;
}
.item-price-usd {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--color-text);
}
.item-price-ves {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-text-muted);
}

/* Quantity stepper */
.qty-control {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: 2px;
  flex-shrink: 0;
}
.qty-btn {
  width: 26px; height: 26px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-weight: 300;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.qty-btn:hover { background: var(--color-surface-4); color: var(--color-text); }
.qty-btn.minus:hover { color: var(--color-error); }
.qty-btn.plus:hover { color: var(--color-primary); }
.qty-display {
  min-width: 28px;
  text-align: center;
  font-size: var(--text-sm);
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--color-text);
  cursor: pointer;
  padding: 0 2px;
}

/* Item line total */
.item-total { text-align: right; flex-shrink: 0; min-width: 60px; }
.item-total-usd {
  font-size: var(--text-sm);
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--color-text);
}
.item-total-ves {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  color: var(--color-text-muted);
}

.item-delete {
  position: absolute;
  right: 4px;
  top: 4px;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-faint);
  border-radius: var(--radius-sm);
  transition: color var(--transition);
  opacity: 0;
  transition: opacity var(--transition), color var(--transition);
}
.cart-item:hover .item-delete { opacity: 1; }
.item-delete:hover { color: var(--color-error); }

/* ===================== TOTALS + CHECKOUT ===================== */
.checkout-panel {
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  padding: var(--space-3) var(--space-4) var(--space-4);
  flex-shrink: 0;
}

.totals-grid {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  margin-bottom: var(--space-3);
}
.totals-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.totals-label {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
.totals-value {
  font-size: var(--text-xs);
  font-family: var(--font-mono);
  font-weight: 500;
  color: var(--color-text);
}

.totals-divider { height: 1px; background: var(--color-divider); margin: var(--space-2) 0; }

.totals-total-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-3);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  margin-bottom: var(--space-3);
}

.total-currency-block { display: flex; flex-direction: column; gap: 2px; }
.total-currency-block + .total-currency-block {
  border-left: 1px solid var(--color-divider);
  padding-left: var(--space-3);
}
.total-currency-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
}
.total-currency-flag {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.total-currency-symbol {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  font-family: var(--font-mono);
}
.total-amount {
  font-size: 22px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: -0.02em;
  transition: color 0.3s;
}
.total-usd { color: var(--color-text); }
.total-ves { color: var(--color-gold); }

/* CTA row */
.cta-row {
  display: flex;
  gap: var(--space-2);
}

.btn-secondary {
  flex: 0 0 auto;
  height: 48px;
  width: 48px;
  display: flex; align-items: center; justify-content: center;
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.btn-secondary:hover { background: var(--color-surface-4); color: var(--color-text); }
.btn-secondary svg { width: 20px; height: 20px; }

.btn-charge {
  flex: 1;
  height: 48px;
  border-radius: var(--radius-lg);
  background: var(--color-primary);
  color: white;
  font-size: var(--text-sm);
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 16px rgba(240,125,42,0.3);
}
.btn-charge:hover { background: var(--color-primary-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,125,42,0.4); }
.btn-charge:active { transform: scale(0.98); }
.btn-charge:disabled { background: var(--color-surface-4); color: var(--color-text-faint); box-shadow: none; cursor: not-allowed; }
.btn-charge svg { width: 18px; height: 18px; }
.btn-charge-amount {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  opacity: 0.85;
}

/* ===================== SCAN OVERLAY ===================== */
.scan-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,9,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.scan-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.scan-viewport {
  width: 220px;
  height: 220px;
  position: relative;
}
.scan-frame {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 2px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.scan-corners::before, .scan-corners::after,
.scan-viewport::before, .scan-viewport::after {
  content: '';
  position: absolute;
  width: 28px; height: 28px;
  border-color: var(--color-primary);
  border-style: solid;
  z-index: 2;
}
.scan-viewport::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; border-radius: 16px 0 0 0; }
.scan-viewport::after  { top: -1px; right: -1px; border-width: 3px 3px 0 0; border-radius: 0 16px 0 0; }
.scan-corners::before  { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; border-radius: 0 0 0 16px; }
.scan-corners::after   { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; border-radius: 0 0 16px 0; }

.scan-line {
  position: absolute;
  left: 10px; right: 10px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--color-primary), transparent);
  border-radius: var(--radius-full);
  top: 20%;
  animation: scanAnim 2s ease-in-out infinite;
  z-index: 3;
}
@keyframes scanAnim {
  0%, 100% { top: 15%; opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  50% { top: 80%; }
}

.scan-label {
  font-size: var(--text-sm);
  color: var(--color-text-muted);
  text-align: center;
}
.scan-sublabel {
  font-size: var(--text-xs);
  color: var(--color-text-faint);
  text-align: center;
  margin-top: var(--space-1);
}

.scan-close {
  width: 44px; height: 44px;
  border-radius: var(--radius-full);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
  margin-top: var(--space-2);
}
.scan-close:hover { background: var(--color-error-dim); color: var(--color-error); }

/* ===================== QTY MODAL ===================== */
.qty-modal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.qty-modal-overlay.active {
  opacity: 1;
  pointer-events: all;
}
.qty-modal {
  background: var(--color-surface);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  border: 1px solid var(--color-border);
  border-bottom: none;
  padding: var(--space-6) var(--space-6) var(--space-8);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.qty-modal-overlay.active .qty-modal {
  transform: translateY(0);
}
.qty-modal-handle {
  width: 36px; height: 4px;
  background: var(--color-border);
  border-radius: var(--radius-full);
  margin: 0 auto var(--space-5);
}
.qty-modal-title {
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: var(--space-1);
}
.qty-modal-product {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-bottom: var(--space-5);
}

.qty-numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-2);
  margin-bottom: var(--space-4);
}
.qty-display-big {
  grid-column: span 3;
  text-align: center;
  font-size: 36px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--color-text);
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-3);
  margin-bottom: var(--space-3);
  letter-spacing: -0.02em;
}

.num-key {
  height: 52px;
  background: var(--color-surface-3);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  font-size: var(--text-lg);
  font-weight: 500;
  color: var(--color-text);
  display: flex; align-items: center; justify-content: center;
  transition: background var(--transition), transform var(--transition);
}
.num-key:hover { background: var(--color-surface-4); }
.num-key:active { transform: scale(0.95); }
.num-key.special { font-size: var(--text-base); color: var(--color-text-muted); }
.num-key.confirm {
  background: var(--color-primary);
  color: white;
  border-color: transparent;
  box-shadow: 0 4px 12px rgba(240,125,42,0.3);
}
.num-key.confirm:hover { background: var(--color-primary-hover); }

/* ===================== SUCCESS TOAST ===================== */
.toast {
  position: absolute;
  top: 60px;
  left: var(--space-4);
  right: var(--space-4);
  background: var(--color-success-dim);
  border: 1px solid rgba(90,171,62,0.3);
  border-radius: var(--radius-lg);
  padding: var(--space-3) var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-2);
  z-index: 200;
  font-size: var(--text-sm);
  color: var(--color-success);
  font-weight: 500;
  transform: translateY(-12px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ===================== BOTTOM PILL NAV ===================== */
.bottom-nav {
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: var(--space-2) var(--space-4) var(--space-3);
  flex-shrink: 0;
}
.nav-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: var(--space-1) var(--space-4);
  border-radius: var(--radius-lg);
  color: var(--color-text-faint);
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  transition: color var(--transition), background var(--transition);
  position: relative;
}
.nav-tab.active { color: var(--color-primary); }
.nav-tab svg { width: 22px; height: 22px; }
.nav-dot {
  position: absolute;
  top: 3px; right: 8px;
  width: 7px; height: 7px;
  background: var(--color-primary);
  border-radius: 50%;
  border: 2px solid var(--color-surface);
}

/* ===================== SEARCH SECTION RELATIVE ===================== */
.search-section { position: relative; }
.search-results-wrap { position: relative; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="phone-frame" id="app">

    <!-- Notch -->
    <div class="phone-notch"><div class="notch-cutout"></div></div>

    <!-- Top Bar -->
    <div class="top-bar">
      <div class="top-bar-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 5h14M3 5l2 10h10l2-10M3 5H1M17 5h2M8 9h4M10 7v4"/>
            <circle cx="8" cy="17" r="1.5"/>
            <circle cx="14" cy="17" r="1.5"/>
          </svg>
        </div>
        <span class="logo-text">Quick<span>Market</span></span>
      </div>
      <div class="top-bar-info">
        <div class="rate-badge">
          <div class="rate-dot"></div>
          <span class="rate-text" id="rateDisplay">1 USD = 41.20 Bs</span>
        </div>
        <div class="rate-label">BCV hoy</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-section">
      <div class="search-row">
        <div class="search-input-wrap" id="searchWrap">
          <span class="search-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </span>
          <input id="searchInput" class="search-input" type="text" placeholder="Buscar producto o código…" autocomplete="off">
          <button class="search-clear" id="clearBtn" onclick="clearSearch()" aria-label="Limpiar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <button class="scan-btn" onclick="toggleScan()" aria-label="Escanear QR">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
            <rect x="7" y="7" width="3" height="3" rx=".5"/><rect x="14" y="7" width="3" height="3" rx=".5"/>
            <rect x="7" y="14" width="3" height="3" rx=".5"/><path d="M14 14h3v3"/>
          </svg>
        </button>
      </div>
      <!-- Search results drop -->
      <div class="search-results-wrap">
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <!-- Cart Items -->
    <div class="cart-section" id="cartSection">
      <div class="cart-header">
        <span class="cart-title">Ticket actual</span>
        <span class="cart-count" id="cartCount">0</span>
      </div>

      <div class="cart-empty" id="cartEmpty">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 8h4l6 22h20l4-16H13"/>
          <circle cx="20" cy="38" r="2.5"/>
          <circle cx="34" cy="38" r="2.5"/>
        </svg>
        <div class="cart-empty-title">El ticket está vacío</div>
        <div class="cart-empty-sub">Busca un producto o escanea el código QR para agregar</div>
      </div>

      <div id="cartItems"></div>
    </div>

    <!-- Checkout Panel -->
    <div class="checkout-panel">
      <div class="totals-grid" id="subtotalsGrid" style="display:none">
        <div class="totals-row">
          <span class="totals-label">Subtotal</span>
          <span class="totals-value" id="subtotalVal">$0.00</span>
        </div>
        <div class="totals-row">
          <span class="totals-label">Ítems</span>
          <span class="totals-value" id="itemsCountVal">0 productos</span>
        </div>
      </div>

      <div class="totals-total-row">
        <div class="total-currency-block">
          <span class="total-currency-label">🇺🇸 Dólares</span>
          <div class="total-currency-flag">
            <span class="total-currency-symbol">$</span>
            <span class="total-amount total-usd" id="totalUSD">0.00</span>
          </div>
        </div>
        <div class="total-currency-block">
          <span class="total-currency-label">🇻🇪 Bolívares</span>
          <div class="total-currency-flag">
            <span class="total-currency-symbol">Bs.</span>
            <span class="total-amount total-ves" id="totalVES">0.00</span>
          </div>
        </div>
      </div>

      <div class="cta-row">
        <button class="btn-secondary" onclick="clearCart()" title="Limpiar ticket">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
          </svg>
        </button>
        <button class="btn-secondary" title="Descuento">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 9h.01M15 15h.01"/><path d="m8.5 15.5 7-7"/>
            <circle cx="12" cy="12" r="9"/>
          </svg>
        </button>
        <button class="btn-charge" id="chargeBtn" onclick="processCharge()" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>Cobrar</span>
          <span class="btn-charge-amount" id="chargeAmount"></span>
        </button>
      </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
      <button class="nav-tab active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        POS
        <div class="nav-dot"></div>
      </button>
      <button class="nav-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        Ventas
      </button>
      <button class="nav-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect width="20" height="14" x="2" y="5" rx="2"/>
          <line x1="2" y1="10" x2="22" y2="10"/>
        </svg>
        Caja
      </button>
      <button class="nav-tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Inventario
      </button>
    </div>

    <!-- Scan Overlay -->
    <div class="scan-overlay" id="scanOverlay">
      <div class="scan-viewport">
        <div class="scan-frame"></div>
        <div class="scan-corners"></div>
        <div class="scan-line"></div>
      </div>
      <div>
        <div class="scan-label">Apunta la cámara al código QR</div>
        <div class="scan-sublabel">o código de barras del producto</div>
      </div>
      <div style="display:flex; gap:12px; flex-direction:column; align-items:center;">
        <button class="num-key confirm" style="width:200px; font-size:14px;" onclick="simulateScan()">
          Simular escaneo ✦
        </button>
        <button class="scan-close" onclick="toggleScan()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Qty Modal -->
    <div class="qty-modal-overlay" id="qtyModal">
      <div class="qty-modal">
        <div class="qty-modal-handle"></div>
        <div class="qty-modal-title" id="qtyModalTitle">Ajustar cantidad</div>
        <div class="qty-modal-product" id="qtyModalProduct"></div>
        <div class="qty-display-big" id="qtyBigDisplay">1</div>
        <div class="qty-numpad">
          <button class="num-key" onclick="numPad('7')">7</button>
          <button class="num-key" onclick="numPad('8')">8</button>
          <button class="num-key" onclick="numPad('9')">9</button>
          <button class="num-key" onclick="numPad('4')">4</button>
          <button class="num-key" onclick="numPad('5')">5</button>
          <button class="num-key" onclick="numPad('6')">6</button>
          <button class="num-key" onclick="numPad('1')">1</button>
          <button class="num-key" onclick="numPad('2')">2</button>
          <button class="num-key" onclick="numPad('3')">3</button>
          <button class="num-key special" onclick="numPad('.')">.</button>
          <button class="num-key" onclick="numPad('0')">0</button>
          <button class="num-key special" onclick="numPad('del')">⌫</button>
          <button class="num-key confirm" onclick="confirmQty()">✓ Confirmar</button>
          <button class="num-key special" style="grid-column:span 2" onclick="closeQtyModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="toastMsg">Producto agregado</span>
    </div>

  </div><!-- /phone-frame -->
</div><!-- /phone-shell -->

<script>
// ===================== DATOS =====================
const RATE = 41.20; // Bs por 1 USD

const PRODUCTS = [
  { id: '1', name: 'Arroz Mary 1kg',      sku: 'SKU-001', barcode: '7501234567890', emoji: '🍚', price: 2.50,  stock: 48 },
  { id: '2', name: 'Aceite Mazeite 1L',   sku: 'SKU-002', barcode: '7509876543210', emoji: '🫙', price: 4.20,  stock: 22 },
  { id: '3', name: 'Harina PAN 1kg',      sku: 'SKU-003', barcode: '7501111111111', emoji: '🌽', price: 1.80,  stock: 60 },
  { id: '4', name: 'Leche completa 1L',   sku: 'SKU-004', barcode: '7502222222222', emoji: '🥛', price: 1.60,  stock: 35 },
  { id: '5', name: 'Azúcar blanca 1kg',   sku: 'SKU-005', barcode: '7503333333333', emoji: '🍬', price: 1.10,  stock: 90 },
  { id: '6', name: 'Café Fama 250g',      sku: 'SKU-006', barcode: '7504444444444', emoji: '☕', price: 3.50,  stock: 18 },
  { id: '7', name: 'Pasta Capri 500g',    sku: 'SKU-007', barcode: '7505555555555', emoji: '🍝', price: 0.95,  stock: 55 },
  { id: '8', name: 'Sardinas Club 425g',  sku: 'SKU-008', barcode: '7506666666666', emoji: '🐟', price: 2.80,  stock: 30 },
  { id: '9', name: 'Mayonesa Kraft 400g', sku: 'SKU-009', barcode: '7507777777777', emoji: '🥪', price: 2.20,  stock: 25 },
  { id:'10', name: 'Jabón Savoy x3',      sku: 'SKU-010', barcode: '7508888888888', emoji: '🧼', price: 1.75,  stock: 40 },
];

// ===================== STATE =====================
let cart = []; // { product, qty }
let qtyEditIndex = null;
let numpadBuffer = '';

// ===================== HELPERS =====================
function fmt2(n) { return n.toFixed(2); }
function fmtBs(n) { return fmt2(n * RATE); }

function showToast(msg) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  m.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ===================== SEARCH =====================
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const clearBtn = document.getElementById('clearBtn');

function filterProducts(q) {
  const lower = q.toLowerCase().trim();
  if (!lower) return [];
  return PRODUCTS.filter(p =>
    p.name.toLowerCase().includes(lower) ||
    p.sku.toLowerCase().includes(lower) ||
    p.barcode.includes(lower)
  ).slice(0, 5);
}

searchInput.addEventListener('input', function() {
  const q = this.value;
  clearBtn.style.display = q ? 'flex' : 'none';
  const found = filterProducts(q);
  renderSearchResults(found);
});

function renderSearchResults(products) {
  if (!products.length) {
    searchResults.classList.remove('visible');
    searchResults.innerHTML = '';
    return;
  }
  searchResults.innerHTML = products.map(p => `
    <div class="result-item" onclick="addToCart('${p.id}')">
      <div class="result-emoji">${p.emoji}</div>
      <div class="result-info">
        <div class="result-name">${p.name}</div>
        <div class="result-meta">${p.sku} · Stock: ${p.stock}</div>
      </div>
      <div class="result-price">
        <div class="result-price-usd">$${fmt2(p.price)}</div>
        <div class="result-price-ves">Bs.${fmtBs(p.price)}</div>
      </div>
    </div>
  `).join('');
  searchResults.classList.add('visible');
}

function clearSearch() {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchResults.classList.remove('visible');
  searchResults.innerHTML = '';
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-section')) {
    searchResults.classList.remove('visible');
  }
});

// ===================== CART =====================
function addToCart(productId) {
  const product = PRODUCTS.find(p => p.id === productId);
  if (!product) return;

  const existing = cart.find(c => c.product.id === productId);
  if (existing) {
    existing.qty += 1;
    showToast(`${product.name} (+1)`);
  } else {
    cart.push({ product, qty: 1 });
    showToast(`${product.name} agregado`);
  }

  clearSearch();
  renderCart();
  updateTotals();
}

function changeQty(index, delta) {
  cart[index].qty += delta;
  if (cart[index].qty <= 0) {
    cart.splice(index, 1);
  }
  renderCart();
  updateTotals();
}

function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
  updateTotals();
}

function clearCart() {
  if (cart.length === 0) return;
  cart = [];
  renderCart();
  updateTotals();
}

function renderCart() {
  const container = document.getElementById('cartItems');
  const empty = document.getElementById('cartEmpty');
  const count = document.getElementById('cartCount');

  count.textContent = cart.reduce((s, c) => s + c.qty, 0);

  if (cart.length === 0) {
    empty.style.display = 'flex';
    container.innerHTML = '';
    document.getElementById('subtotalsGrid').style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  document.getElementById('subtotalsGrid').style.display = 'flex';

  container.innerHTML = cart.map((item, i) => {
    const lineUSD = item.product.price * item.qty;
    const lineVES = lineUSD * RATE;
    return `
      <div class="cart-item">
        <div class="item-emoji">${item.product.emoji}</div>
        <div class="item-info">
          <div class="item-name">${item.product.name}</div>
          <div class="item-prices">
            <span class="item-price-usd">$${fmt2(item.product.price)}</span>
            <span class="item-price-ves">· Bs.${fmtBs(item.product.price)}</span>
          </div>
        </div>
        <div class="qty-control">
          <button class="qty-btn minus" onclick="changeQty(${i}, -1)">−</button>
          <span class="qty-display" onclick="openQtyModal(${i})" title="Editar cantidad">${item.qty}</span>
          <button class="qty-btn plus" onclick="changeQty(${i}, 1)">+</button>
        </div>
        <div class="item-total">
          <div class="item-total-usd">$${fmt2(lineUSD)}</div>
          <div class="item-total-ves">Bs.${fmt2(lineVES)}</div>
        </div>
        <button class="item-delete" onclick="removeItem(${i})" aria-label="Eliminar">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    `;
  }).join('');
}

function updateTotals() {
  const totalUSD = cart.reduce((s, c) => s + c.product.price * c.qty, 0);
  const totalVES = totalUSD * RATE;
  const totalItems = cart.reduce((s, c) => s + c.qty, 0);

  document.getElementById('totalUSD').textContent = fmt2(totalUSD);
  document.getElementById('totalVES').textContent = fmt2(totalVES);
  document.getElementById('subtotalVal').textContent = '$' + fmt2(totalUSD);
  document.getElementById('itemsCountVal').textContent = totalItems + (totalItems === 1 ? ' producto' : ' productos');

  const btn = document.getElementById('chargeBtn');
  const amt = document.getElementById('chargeAmount');
  btn.disabled = cart.length === 0;
  amt.textContent = cart.length > 0 ? `$${fmt2(totalUSD)}` : '';
}

// ===================== SCAN =====================
function toggleScan() {
  const overlay = document.getElementById('scanOverlay');
  overlay.classList.toggle('active');
}

function simulateScan() {
  // Simulate scanning random product
  const randomProduct = PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)];
  toggleScan();
  setTimeout(() => {
    addToCart(randomProduct.id);
  }, 150);
}

// ===================== QTY MODAL =====================
function openQtyModal(index) {
  qtyEditIndex = index;
  numpadBuffer = String(cart[index].qty);
  document.getElementById('qtyModalTitle').textContent = 'Ajustar cantidad';
  document.getElementById('qtyModalProduct').textContent = cart[index].product.name;
  document.getElementById('qtyBigDisplay').textContent = numpadBuffer;
  document.getElementById('qtyModal').classList.add('active');
}

function closeQtyModal() {
  document.getElementById('qtyModal').classList.remove('active');
  qtyEditIndex = null;
  numpadBuffer = '';
}

function numPad(key) {
  if (key === 'del') {
    numpadBuffer = numpadBuffer.slice(0, -1) || '0';
  } else if (key === '.') {
    if (!numpadBuffer.includes('.')) numpadBuffer += '.';
  } else {
    if (numpadBuffer === '0') numpadBuffer = key;
    else numpadBuffer += key;
    if (numpadBuffer.length > 6) numpadBuffer = numpadBuffer.slice(0, 6);
  }
  document.getElementById('qtyBigDisplay').textContent = numpadBuffer || '0';
}

function confirmQty() {
  const newQty = parseFloat(numpadBuffer);
  if (!isNaN(newQty) && newQty > 0 && qtyEditIndex !== null) {
    cart[qtyEditIndex].qty = newQty;
    renderCart();
    updateTotals();
  } else if (newQty <= 0 && qtyEditIndex !== null) {
    cart.splice(qtyEditIndex, 1);
    renderCart();
    updateTotals();
  }
  closeQtyModal();
}

// ===================== CHARGE =====================
function processCharge() {
  if (cart.length === 0) return;
  const totalUSD = cart.reduce((s, c) => s + c.product.price * c.qty, 0);
  showToast(`✓ Cobro por $${fmt2(totalUSD)} procesado`);
  setTimeout(() => {
    cart = [];
    renderCart();
    updateTotals();
  }, 1000);
}

// Init
